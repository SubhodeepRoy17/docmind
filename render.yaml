services:
  - type: web
    name: docmind-backend
    runtime: python
    runtimeVersion: 3.11
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT backend.main:app
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
    rootDir: .
    regions:
      - oregon
